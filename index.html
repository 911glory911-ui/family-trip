<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Family Travel Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;

font-family:'Poppins',sans-serif;

overflow:hidden;

color:white;

}

body{

background:url("background.png") center center no-repeat;

background-size:cover;

}

.overlay{

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

background:rgba(0,0,0,.35);

backdrop-filter:blur(2px);

}

.container{

position:relative;

z-index:2;

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;

}

h1{

font-size:58px;

font-weight:800;

text-shadow:0 0 20px black;

margin-bottom:10px;

}

h2{

font-size:26px;

font-weight:400;

margin-bottom:45px;

text-shadow:0 0 12px black;

}

#countdown{

display:flex;

gap:20px;

flex-wrap:wrap;

justify-content:center;

}

.box{

width:160px;

padding:25px;

border-radius:25px;

background:rgba(255,255,255,.16);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,.35);

box-shadow:0 15px 35px rgba(0,0,0,.35);

}

.number{

font-size:58px;

font-weight:800;

color:#FFD84D;

}

.label{

margin-top:8px;

font-size:18px;

}

.plane{

position:fixed;

top:70px;

left:-120px;

font-size:60px;

animation:plane 18s linear infinite;

}

.train{

position:fixed;

bottom:35px;

left:-180px;

font-size:58px;

animation:train 22s linear infinite;

} 
@keyframes plane{

0%{

left:-120px;

}

100%{

left:110%;

}

}

@keyframes train{

0%{

left:-220px;

}

100%{

left:110%;

}

}

@media(max-width:768px){

h1{

font-size:36px;

}

h2{

font-size:20px;

}

.box{

width:120px;

padding:18px;

}

.number{

font-size:42px;

}

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="plane">✈️</div>

<div class="train">🚆</div>

<div class="container">

<h1>

🇳🇱 Amsterdam Schiphol 🇳🇱

</h1>

<h2>

До прибытия мамы и сестры

<br>

03.07.2026 • 22:25

</h2>

<div id="countdown">

<div class="box">

<div id="days" class="number">000</div>

<div class="label">Дней</div>

</div>

<div class="box">

<div id="hours" class="number">00</div>

<div class="label">Часов</div>

</div>

<div class="box">

<div id="minutes" class="number">00</div>

<div class="label">Минут</div>

</div>

<div class="box">

<div id="seconds" class="number">00</div>

<div class="label">Секунд</div>

</div>

</div>

</div>

<script>

const targetDate = new Date("2026-07-03T22:25:00+02:00");

const days = document.getElementById("days");

const hours = document.getElementById("hours");

const minutes = document.getElementById("minutes");

const seconds = document.getElementById("seconds");

function updateCountdown(){

const now = new Date();

const difference = targetDate.getTime() - now.getTime();

if(difference <= 0){

days.textContent = "000";
hours.textContent = "00";
minutes.textContent = "00";
seconds.textContent = "00";

return;

}

const totalSeconds = Math.floor(difference / 1000);

const d = Math.floor(totalSeconds / 86400);

const h = Math.floor((totalSeconds % 86400) / 3600);

const m = Math.floor((totalSeconds % 3600) / 60);

const s = totalSeconds % 60;

days.textContent = String(d).padStart(3,"0");

hours.textContent = String(h).padStart(2,"0");

minutes.textContent = String(m).padStart(2,"0");

seconds.textContent = String(s).padStart(2,"0");

}

updateCountdown();

setInterval(updateCountdown,1000);

</script>

</body>

</html>
